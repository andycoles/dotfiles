# ============================================================
# General
# ============================================================

# Prefix: Ctrl-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Start windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Scrollback buffer
set -g history-limit 50000

# Faster escape (critical for Neovim)
set -sg escape-time 10
set -g repeat-time 600

# Focus events (needed by some neovim plugins)
set -g focus-events on

# 24-bit colour
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ============================================================
# Mouse
# ============================================================
set -g mouse on

# ============================================================
# Key bindings
# ============================================================

# Reload config
bind r source-file ~/.tmux.conf \; display "  Config reloaded!"

# Intuitive splits — open in current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current directory
bind c new-window -c "#{pane_current_path}"

# Pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing (repeatable with -r)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Move windows left/right
bind -r < swap-window -d -t -1
bind -r > swap-window -d -t +1

# ============================================================
# Vi copy mode
# ============================================================
setw -g mode-keys vi

bind Enter copy-mode
bind -T copy-mode-vi v   send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y   send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi H   send-keys -X start-of-line
bind -T copy-mode-vi L   send-keys -X end-of-line

# ============================================================
# Status bar — Tokyo Night palette
# ============================================================
set -g status-position top
set -g status-style          "bg=#1a1b26,fg=#a9b1d6"
set -g status-left-length    40
set -g status-right-length   60

set -g status-left  "#[fg=#1a1b26,bg=#7aa2f7,bold] #S #[fg=#7aa2f7,bg=#1a1b26,nobold]"
set -g status-right "#[fg=#565f89] %Y-%m-%d #[fg=#7aa2f7,bold] %H:%M "

set -g window-status-format         "#[fg=#565f89]  #I:#W "
set -g window-status-current-format "#[fg=#1a1b26,bg=#7aa2f7,bold] #I:#W #[fg=#7aa2f7,bg=#1a1b26,nobold]"
set -g window-status-separator      ""

set -g pane-border-style        "fg=#24283b"
set -g pane-active-border-style "fg=#7aa2f7"
set -g message-style            "bg=#24283b,fg=#7aa2f7"
set -g message-command-style    "bg=#24283b,fg=#9ece6a"
set -g mode-style               "bg=#7aa2f7,fg=#1a1b26"

# ============================================================
# Plugins (tpm)
# ============================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Auto-save every 10 min, auto-restore on tmux start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

# Also save/restore neovim sessions
set -g @resurrect-strategy-nvim 'session'

# Initialize tpm — MUST be the last line
run '~/.tmux/plugins/tpm/tpm'
