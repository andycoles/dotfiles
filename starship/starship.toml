"$schema" = 'https://starship.rs/config-schema.json'

# Left prompt — two lines: info bar on top, ❯ on its own line
format = """
$directory\
$git_branch\
$git_status\
$fill\
$nodejs\
$python\
$rust\
$golang\
$cmd_duration\
$time\
$line_break\
$character"""

add_newline = true

palette = 'tokyo_night'

[palettes.tokyo_night]
dark    = '#1a1b26'
surface = '#24283b'
overlay = '#414868'
muted   = '#565f89'
text    = '#a9b1d6'
blue    = '#7aa2f7'
cyan    = '#7dcfff'
green   = '#9ece6a'
yellow  = '#e0af68'
red     = '#f7768e'
magenta = '#bb9af7'
orange  = '#ff9e64'

# ── Fill (pushes right-side modules to the right) ────────────
[fill]
symbol = ' '

# ── Directory ────────────────────────────────────────────────
[directory]
format            = '[ 󰉋 $path ]($style)'
style             = 'bg:surface fg:blue bold'
truncation_length = 3
truncate_to_repo  = true
home_symbol       = '~'

[directory.substitutions]
'Documents' = '󰈙 '
'Downloads' = ' '
'src'       = ' '

# ── Git branch ───────────────────────────────────────────────
[git_branch]
format = '[](fg:surface bg:overlay)[ $symbol$branch ]($style)'
symbol = ' '
style  = 'bg:overlay fg:cyan bold'

# ── Git status ───────────────────────────────────────────────
[git_status]
format     = '([$all_status$ahead_behind ]($style))[](fg:overlay)'
style      = 'bg:overlay fg:yellow'
conflicted = '󰩌 '
ahead      = '⇡${count} '
behind     = '⇣${count} '
diverged   = '⇡${ahead_count}⇣${behind_count} '
untracked  = '? '
stashed    = ' '
modified   = '! '
staged     = '+${count} '
renamed    = '» '
deleted    = '✘ '

# ── Language versions (only shown when in relevant project) ──
[nodejs]
format       = '[ $symbol$version ]($style)'
symbol       = ' '
style        = 'fg:green'
detect_files = ['package.json', '.nvmrc', '.node-version']

[python]
format       = '[ $symbol$version ]($style)'
symbol       = ' '
style        = 'fg:yellow'
detect_files = ['requirements.txt', 'pyproject.toml', 'setup.py', '.python-version', 'Pipfile']

[rust]
format = '[ $symbol$version ]($style)'
symbol = ' '
style  = 'fg:orange'

[golang]
format = '[ $symbol$version ]($style)'
symbol = ' '
style  = 'fg:cyan'

# ── Command duration (only shown when ≥ 3s) ──────────────────
[cmd_duration]
min_time          = 3_000
format            = '[ 󱦟 $duration ]($style)'
style             = 'fg:yellow'
show_milliseconds = false

# ── Time ─────────────────────────────────────────────────────
[time]
disabled    = false
format      = '[ 󰥔 $time ]($style)'
style       = 'fg:muted'
time_format = '%H:%M'
use_12hr    = false

# ── Prompt character ─────────────────────────────────────────
[character]
success_symbol = '[❯](bold green)'
error_symbol   = '[❯](bold red)'
vimcmd_symbol  = '[❮](bold blue)'
